services:
  # Message Broker (self-hosted on Coolify)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: smart-job-portal-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - smart-job-network

  # Backend Server (Main API)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-job-portal-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DB: ${DB}
      JWTPRIVATEKEY: ${JWTPRIVATEKEY}
      SALT: ${SALT}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_CHATBOT_API_KEY: ${GEMINI_CHATBOT_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      CV_EVAL_QUEUE: ${CV_EVAL_QUEUE}
      RESULT_QUEUE: ${RESULT_QUEUE}
      CV_EVAL_SERVICE_URL: http://cv-evaluation:8081
      QUEUE_SERVICE_URL: http://queue-service:8081
    volumes:
      - server-uploads:/app/Uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - smart-job-network

  # CV Evaluation Microservice
  cv-evaluation:
    build:
      context: ./cv-evaluation
      dockerfile: Dockerfile
    container_name: smart-job-portal-cv-evaluation
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8081
      SERVICE_NAME: cv-evaluation-service
      DB: ${DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      CV_EVAL_QUEUE: ${CV_EVAL_QUEUE}
      RESULT_QUEUE: ${RESULT_QUEUE}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      QUEUE_SERVICE_URL: http://queue-service:8081
      MAIN_BACKEND_URL: http://server:8080
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - smart-job-network

  # Email Notification Microservice
  email-service:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    container_name: smart-job-portal-email-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8082
      SERVICE_NAME: email-notification-service
      DB: ${DB}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      RESULT_QUEUE: ${RESULT_QUEUE}
      EMAIL_QUEUE: ${EMAIL_QUEUE}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_SECURE: ${EMAIL_SECURE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - smart-job-network

  # Queue Management Service
  queue-service:
    build:
      context: ./queue-service
      dockerfile: Dockerfile
    container_name: smart-job-portal-queue-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8081
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      CV_EVAL_QUEUE: ${CV_EVAL_QUEUE}
      RESULT_QUEUE: ${RESULT_QUEUE}
      EMAIL_QUEUE: ${EMAIL_QUEUE}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - smart-job-network

  # Frontend Client (Next.js)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: smart-job-portal-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      NEXT_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      NEXT_AWS_REGION: ${AWS_REGION}
      NEXT_AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      GEMINI_CHATBOT_API_KEY: ${GEMINI_CHATBOT_API_KEY}
    depends_on:
      - server
    networks:
      - smart-job-network

networks:
  smart-job-network:
    driver: bridge

volumes:
  rabbitmq-data:
  server-uploads:
